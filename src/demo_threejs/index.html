<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>ПДД Симулятор — Бишкек</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Интерактивный тренажёр правил дорожного движения. Бишкек.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚦</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 20px; left: 20px; color: #fff;
    font-size: 13px; line-height: 1.7;
    background: rgba(0,0,0,0.55); padding: 14px 20px; border-radius: 10px;
    backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08);
  }
  #hud h3 { font-size: 16px; margin-bottom: 6px; font-weight: 600; }
  .dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%; vertical-align: middle; margin-right: 4px; }
  .dot.g { background: #3f3; box-shadow: 0 0 8px #3f3; }
  .dot.y { background: #fc0; box-shadow: 0 0 8px #fc0; }
  .dot.r { background: #f34; box-shadow: 0 0 8px #f34; }
  #bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
  #bar button {
    background: rgba(255,255,255,0.08); color: #bbb; border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
    backdrop-filter: blur(10px); transition: 0.15s;
  }
  #bar button:hover { background: rgba(255,255,255,0.18); color: #fff; }
  #bar button.on { background: rgba(100,180,255,0.2); border-color: rgba(100,180,255,0.35); color: #fff; }
  #load { position: fixed; inset: 0; background: #111; display: flex; align-items: center;
    justify-content: center; color: #888; font-size: 15px; z-index: 99; transition: opacity .6s; }
  #load.ok { opacity: 0; pointer-events: none; }

  /* Quiz overlay */
  #quiz { position: fixed; inset: 0; display: none; z-index: 50; pointer-events: none; }
  #quiz.active { display: flex; align-items: flex-end; justify-content: center; padding: 20px; pointer-events: auto; }
  #quiz-card {
    background: rgba(15,15,20,0.88); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 24px 28px; max-width: 520px; width: 100%; color: #fff;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  #quiz-card h4 { font-size: 14px; color: #8ab; margin-bottom: 6px; font-weight: 500; letter-spacing: 0.03em; }
  #quiz-card p.q { font-size: 17px; font-weight: 600; line-height: 1.4; margin-bottom: 16px; }
  .opts { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 12px 16px; cursor: pointer; font-size: 15px;
    color: #ddd; transition: all 0.15s; text-align: left;
  }
  .opt:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); color: #fff; }
  .opt.correct { background: rgba(40,180,80,0.25); border-color: rgba(40,180,80,0.5); color: #7efa9e; }
  .opt.wrong { background: rgba(220,50,50,0.2); border-color: rgba(220,50,50,0.4); color: #ff8888; }
  .opt.disabled { pointer-events: none; opacity: 0.5; }
  #explanation {
    display: none; margin-top: 14px; padding: 14px; background: rgba(255,255,255,0.05);
    border-radius: 10px; font-size: 14px; line-height: 1.5; color: #bbb;
  }
  #explanation.show { display: block; }
  #explanation .article { color: #8ab; font-weight: 500; margin-top: 6px; }
  #next-btn {
    display: none; margin-top: 14px; width: 100%; padding: 12px; border-radius: 10px;
    background: rgba(100,180,255,0.2); border: 1px solid rgba(100,180,255,0.3);
    color: #fff; font-size: 15px; cursor: pointer; transition: 0.15s;
  }
  #next-btn:hover { background: rgba(100,180,255,0.35); }
  #next-btn.show { display: block; }

  /* Start screen */
  #start-screen {
    position: fixed; inset: 0; z-index: 60; background: rgba(10,10,15,0.92);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(20px);
  }
  #start-screen.hidden { display: none; }
  #start-inner { text-align: center; color: #fff; max-width: 400px; padding: 20px; }
  #start-inner h1 { font-size: 28px; margin-bottom: 8px; }
  #start-inner h2 { font-size: 16px; font-weight: 400; color: #8ab; margin-bottom: 24px; }
  #start-inner .emoji { font-size: 64px; margin-bottom: 16px; }
  #start-btn {
    padding: 14px 40px; border-radius: 12px; font-size: 17px; font-weight: 600;
    background: linear-gradient(135deg, #3b82f6, #2563eb); border: none;
    color: #fff; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 20px rgba(59,130,246,0.3);
  }
  #start-btn:hover { transform: scale(1.03); box-shadow: 0 6px 30px rgba(59,130,246,0.4); }
  #score-display { margin-top: 16px; font-size: 14px; color: #888; }

  /* Results screen */
  #results { position: fixed; inset: 0; z-index: 55; display: none; background: rgba(10,10,15,0.92);
    align-items: center; justify-content: center; backdrop-filter: blur(20px); }
  #results.show { display: flex; }
  #results-inner { text-align: center; color: #fff; max-width: 420px; padding: 20px; }
  #results-inner h2 { font-size: 24px; margin-bottom: 12px; }
  #results-inner .big { font-size: 64px; margin: 20px 0; }
  #results-inner p { color: #aaa; font-size: 15px; line-height: 1.5; margin-bottom: 20px; }
  #restart-btn {
    padding: 12px 32px; border-radius: 10px; font-size: 16px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    color: #fff; cursor: pointer; transition: 0.15s;
  }
  #restart-btn:hover { background: rgba(255,255,255,0.2); }

  /* Mobile */
  @media (max-width: 600px) {
    #hud { top: 10px; left: 10px; padding: 10px 14px; font-size: 12px; }
    #hud h3 { font-size: 14px; }
    #bar { bottom: 10px; gap: 4px; }
    #bar button { padding: 6px 10px; font-size: 11px; }
    #quiz-card { padding: 18px 20px; margin: 0 10px; }
    #quiz-card p.q { font-size: 15px; }
    .opt { padding: 10px 14px; font-size: 14px; }
    #start-inner h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div id="load">Загрузка моделей… <span id="pct">0</span>%</div>

<div id="start-screen">
  <div id="start-inner">
    <div class="emoji">🚦</div>
    <h1>ПДД Тренажёр</h1>
    <h2>Бишкек • Интерактивные ситуации</h2>
    <button id="start-btn" onclick="startQuiz()">Начать</button>
    <div id="score-display"></div>
  </div>
</div>

<div id="hud">
  <h3>ПДД — Перекрёсток</h3>
  <div>Светофор: <span class="dot g" id="dot"></span><span id="ltxt">Зелёный</span></div>
  <div>Вопрос <span id="qnum">0</span> / <span id="qtotal">0</span></div>
</div>

<div id="quiz">
  <div id="quiz-card">
    <h4 id="quiz-title"></h4>
    <p class="q" id="quiz-question"></p>
    <div class="opts" id="quiz-options"></div>
    <div id="explanation">
      <span id="expl-text"></span>
      <div class="article" id="expl-article"></div>
    </div>
    <button id="next-btn" onclick="nextQuestion()">Следующий вопрос →</button>
  </div>
</div>

<div id="results">
  <div id="results-inner">
    <h2>Результат</h2>
    <div class="big" id="result-emoji"></div>
    <p id="result-text"></p>
    <button id="restart-btn" onclick="restartQuiz()">Пройти ещё раз</button>
  </div>
</div>

<div id="bar">
  <button class="on" data-c="top">Сверху</button>
  <button data-c="drv">Водитель</button>
  <button data-c="ped">Пешеход</button>
  <button data-c="cin">Кино</button>
  <button id="pp">⏸</button>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* ── renderer ─────────────────────────── */
const R = new THREE.WebGLRenderer({ antialias: true });
R.setSize(innerWidth, innerHeight);
R.setPixelRatio(Math.min(devicePixelRatio, 2));
R.shadowMap.enabled = true;
R.shadowMap.type = THREE.PCFSoftShadowMap;
R.toneMapping = THREE.ACESFilmicToneMapping;
R.toneMappingExposure = 1.15;
document.body.appendChild(R.domElement);

const S = new THREE.Scene();
S.background = new THREE.Color(0x7ec8e3);
S.fog = new THREE.Fog(0x7ec8e3, 80, 250);

const cam = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, .1, 500);
cam.position.set(5, 32, 35);
const oc = new OrbitControls(cam, R.domElement);
oc.enableDamping = true; oc.dampingFactor = .06;
oc.maxPolarAngle = Math.PI / 2.05;

/* ── light ────────────────────────────── */
S.add(new THREE.AmbientLight(0xa0b8d0, .7));
const sun = new THREE.DirectionalLight(0xfff0d0, 2.5);
sun.position.set(40, 60, 30); sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
const sc = sun.shadow.camera;
sc.left = sc.bottom = -70; sc.right = sc.top = 70; sc.near = 1; sc.far = 150;
sun.shadow.bias = -.0003; sun.shadow.normalBias = .02;
S.add(sun);
S.add(new THREE.DirectionalLight(0xb0c8ff, .4).translateX(-30).translateY(40));
S.add(new THREE.HemisphereLight(0x87ceeb, 0x3a7a20, .4));

/* ── sky ──────────────────────────────── */
const skyM = new THREE.ShaderMaterial({ side: THREE.BackSide,
  uniforms: { t: { value: new THREE.Color(0x4488cc) }, b: { value: new THREE.Color(0xc8e0f0) } },
  vertexShader: `varying vec3 vP; void main(){ vec4 w=modelMatrix*vec4(position,1.); vP=w.xyz; gl_Position=projectionMatrix*viewMatrix*w; }`,
  fragmentShader: `uniform vec3 t,b; varying vec3 vP; void main(){ float h=normalize(vP).y*.5+.5; gl_FragColor=vec4(mix(b,t,h),1.); }` });
S.add(new THREE.Mesh(new THREE.SphereGeometry(180,32,32), skyM));

/* ── materials ────────────────────────── */
// PBR asphalt texture (Poly Haven CC0)
const texLoader = new THREE.TextureLoader();
const asphTex = texLoader.load('models/asphalt_diff.jpg');
asphTex.wrapS = asphTex.wrapT = THREE.RepeatWrapping;
asphTex.repeat.set(20, 20);
const asphRough = texLoader.load('models/asphalt_rough.jpg');
asphRough.wrapS = asphRough.wrapT = THREE.RepeatWrapping;
asphRough.repeat.set(20, 20);
const asphNor = texLoader.load('models/asphalt_nor.jpg');
asphNor.wrapS = asphNor.wrapT = THREE.RepeatWrapping;
asphNor.repeat.set(20, 20);
const asph = new THREE.MeshStandardMaterial({ map: asphTex, roughnessMap: asphRough, normalMap: asphNor, roughness: 0.95 });
const side = new THREE.MeshStandardMaterial({ color: 0xb5a590, roughness: .88 });
const grass = new THREE.MeshStandardMaterial({ color: 0x4a8a2a, roughness: .95 });
const mark = new THREE.MeshStandardMaterial({ color: 0xe8e8e8, roughness: .65 });

/* ── ground + roads ───────────────────── */
const gnd = new THREE.Mesh(new THREE.PlaneGeometry(300,300), grass);
gnd.rotation.x = -Math.PI/2; gnd.position.y = -.05; gnd.receiveShadow = true; S.add(gnd);

function road(w,h,x,z){ const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),asph); m.rotation.x=-Math.PI/2; m.position.set(x,.01,z); m.receiveShadow=true; S.add(m); }
road(14,140,0,0); road(140,12,0,0);

function sw(w,h,x,z){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,.18,h),side); m.position.set(x,.09,z); m.receiveShadow=true; m.castShadow=true; S.add(m); }
sw(5,140,12,0); sw(5,140,-12,0); sw(140,4.5,0,10.5); sw(140,4.5,0,-10.5);

// markings
for(let i=-65;i<=65;i+=4){ if(Math.abs(i)<8)continue; const d=new THREE.Mesh(new THREE.PlaneGeometry(.18,2.2),mark); d.rotation.x=-Math.PI/2; d.position.set(0,.025,i); S.add(d); }
for(let i=-65;i<=65;i+=4){ if(Math.abs(i)<9)continue; const d=new THREE.Mesh(new THREE.PlaneGeometry(2.2,.18),mark); d.rotation.x=-Math.PI/2; d.position.set(i,.025,0); S.add(d); }
[-6.9,6.9].forEach(x=>{ const l=new THREE.Mesh(new THREE.PlaneGeometry(.12,140),mark); l.rotation.x=-Math.PI/2; l.position.set(x,.02,0); S.add(l); });
[-5.9,5.9].forEach(z=>{ const l=new THREE.Mesh(new THREE.PlaneGeometry(140,.12),mark); l.rotation.x=-Math.PI/2; l.position.set(0,.02,z); S.add(l); });

// Bishkek-style yellow+white zebra
const ymark = new THREE.MeshStandardMaterial({ color: 0xf0c820, roughness: .6 });
function zebra(cx,cz,rot){ for(let i=-5;i<=5;i+=1.1){
  const mat = (Math.round(i/.55) % 2 === 0) ? mark : ymark; // alternate white/yellow
  const s=new THREE.Mesh(new THREE.PlaneGeometry(rot?.5:3.8,rot?3.8:.5),mat);
  s.rotation.x=-Math.PI/2; s.position.set(cx+(rot?i:0),.03,cz+(rot?0:i)); S.add(s); } }
zebra(0,-8.5,0); zebra(0,8.5,0); zebra(-9,0,1); zebra(9,0,1);

// Yellow waffle marking in intersection center (Bishkek signature!)
const waffle = new THREE.MeshStandardMaterial({ color: 0xf0c820, roughness: .6 });
// Diamond grid lines
for(let i=-6;i<=6;i+=1.8){
  // diagonal lines one way
  const l1 = new THREE.Mesh(new THREE.PlaneGeometry(16,.1), waffle);
  l1.rotation.x = -Math.PI/2;
  l1.rotation.z = Math.PI/4;
  l1.position.set(i*.7, .035, i*.7);
  S.add(l1);
  // diagonal lines other way
  const l2 = new THREE.Mesh(new THREE.PlaneGeometry(16,.1), waffle);
  l2.rotation.x = -Math.PI/2;
  l2.rotation.z = -Math.PI/4;
  l2.position.set(-i*.7, .035, i*.7);
  S.add(l2);
}
// Outer yellow border of waffle zone
const border = new THREE.MeshStandardMaterial({ color: 0xf0c820, roughness: .5 });
[[-6,0,12,.15],[ 6,0,12,.15],[0,-6,.15,12],[0,6,.15,12]].forEach(([x,z,w,h])=>{
  const b = new THREE.Mesh(new THREE.PlaneGeometry(w,h), border);
  b.rotation.x=-Math.PI/2; b.position.set(x,.04,z); S.add(b);
});

/* ── loader ───────────────────────────── */
const L = new GLTFLoader();
const db = {};
const manifest = [
  // Sketchfab PS1-style vehicles (consistent realistic style)
  {n:'car_corolla', p:'models/sketchfab/ps1-corolla/scene.gltf'},
  {n:'car_golf', p:'models/sketchfab/ps1-vw-golf/scene.gltf'},
  {n:'car_bmw', p:'models/sketchfab/lp-bmw-e46/scene.gltf'},
  {n:'car_tahoe', p:'models/sketchfab/ps1-tahoe/scene.gltf'},
  {n:'car_taxi', p:'models/sketchfab/taxi-stylized/scene.gltf'},
  {n:'car_van', p:'models/sketchfab/ps1-white-van/scene.gltf'},
  {n:'car_truck', p:'models/sketchfab/ps1-jp-truck/scene.gltf'},
  {n:'lp_people', p:'models/sketchfab/lowpoly-people/scene.gltf'},
  {n:'bicycle', p:'models/sketchfab/bicycle/scene.gltf'},
  // KayKit props only (buildings removed — using Sketchfab)
  ...['trafficlight_A','trafficlight_B','streetlight',
      'bench','bush','dumpster','firehydrant','watertower',
  ].map(n=>({n:`kk_${n}`, p:`models/kaykit/${n}.gltf`})),
  // Bishkek assets (Poly Pizza)
  {n:'poplar', p:'models/poplar-pp.glb'},
  {n:'city_bus', p:'models/bus-3.glb'},
  {n:'apt_block', p:'models/apartment-2.glb'},
  // Sketchfab soviet buildings
  {n:'sf_soviet_8k', p:'models/sketchfab/soviet-apartment-8k/scene.gltf'},
  {n:'sf_panel', p:'models/sketchfab/soviet-panel-house/scene.gltf'},
  {n:'sf_khrush', p:'models/sketchfab/khrushchevka-small/scene.gltf'},
  // Sketchfab buses
  {n:'sf_bus_modern', p:'models/sketchfab/modern-bus/scene.gltf'},
  {n:'sf_bus_green', p:'models/sketchfab/green-bus/scene.gltf'},
  // Sketchfab poplar + bus stops
  {n:'sf_poplar', p:'models/sketchfab/poplar-tree-sf/scene.gltf'},
  {n:'sf_bus_stop_cozy', p:'models/sketchfab/sf-bus-stop-cozy/scene.gltf'},
  // New: office, glass, shop
  {n:'office_bld', p:'models/office-building.glb'},
  {n:'glass_bld', p:'models/glass-building.glb'},
  {n:'shop1', p:'models/shop-1.glb'},
  {n:'bus_stop_pp', p:'models/bus-stop-2.glb'},
];

let loaded = 0;
function load(item){
  return new Promise(res => {
    L.load(item.p, g => {
      db[item.n] = g.scene;
      g.scene.traverse(c => { if(c.isMesh){ c.castShadow=true; c.receiveShadow=true; } });
      loaded++; document.getElementById('pct').textContent = Math.round(loaded/manifest.length*100);
      res();
    }, undefined, () => { loaded++; res(); });
  });
}

function put(n,x,y,z,s=1,ry=0){
  if(!db[n]) return null;
  const m = db[n].clone();
  m.position.set(x,y,z); m.scale.setScalar(s); m.rotation.y=ry;
  S.add(m); return m;
}

/* ── build scene ──────────────────────── */
const mv = { cars: [], cyc: null, peds: [] };

function build(){
  // Soviet buildings — Sketchfab realism
  // soviet-apartment-8k: max=1.7 → scale 18 for ~30m building
  // soviet-panel-house: max=179 → scale 0.14 for ~25m
  // khrushchevka-small: max=15 → scale 2 for ~13m
  const bld = [
    // Main corners — authentic soviet buildings
    ['sf_soviet_8k', -30, 0, -28, 18, 0],
    ['sf_soviet_8k', 32, 0, 28, 18, Math.PI],
    ['sf_khrush', 30, 0, -28, 2, Math.PI/2],
    ['sf_khrush', -30, 0, 28, 2, -Math.PI/2],
    ['sf_panel', -40, 0, 0, 0.14, Math.PI/2],
    ['sf_panel', 44, 0, -5, 0.14, -Math.PI/2],
    // Modern buildings (mixed Bishkek — glass + office + shops)
    ['office_bld', -42, 0, 0, 12, Math.PI/2],
    ['glass_bld', 44, 0, -5, 8, -Math.PI/2],
    ['shop1', 14, 0, -20, 0.35, -Math.PI/2],
    ['shop1', -14, 0, 20, 0.35, Math.PI/2],
    // Far buildings
    ['sf_soviet_8k', -30, 0, -60, 18, 0.1],
    ['sf_khrush', 35, 0, 60, 2, Math.PI],
    ['sf_soviet_8k', 40, 0, -55, 16, -Math.PI/4],
    ['sf_panel', -42, 0, 50, 0.12, 0.5],
  ];
  bld.forEach(b => put(...b));

  // Bus stop shelter (sf_bus_stop_cozy is ~3m native, scale 1)
  put('sf_bus_stop_cozy', 13, 0, 15, 1, -Math.PI/2);

  // KayKit traffic lights
  put('kk_trafficlight_A', 8, 0, 7.5, 3, 0);
  put('kk_trafficlight_A', -8, 0, -7.5, 3, Math.PI);
  put('kk_trafficlight_B', -7.5, 0, 7.5, 3, Math.PI/2);
  put('kk_trafficlight_B', 7.5, 0, -7.5, 3, -Math.PI/2);

  // Russian road signs — warning pack is one big set, too much for now
  // TODO: extract individual signs from the pack in Blender
  // For now, skip — use KayKit traffic lights only

  // Streetlights
  for(let z=-50; z<=50; z+=20){
    put('kk_streetlight', 10, 0, z, 3, 0);
    put('kk_streetlight', -10, 0, z, 3, Math.PI);
  }

  // Props
  put('kk_bench', 13, 0, -4, 3, 0);
  put('kk_bench', 13, 0, 4, 3, 0);
  put('kk_bench', -13, 0, -2, 3, Math.PI);
  put('kk_dumpster', 14, 0, -18, 2.5, .3);
  put('kk_firehydrant', 10, 0, 6, 3, 0);
  put('kk_firehydrant', -10, 0, -6, 3, 0);
  put('kk_watertower', 35, 0, -40, 3, 0);

  // Bushes
  [[-12,14],[-12,-14],[12,14],[12,-14],[-12,25],[12,-25],[-14,35],[14,-35]].forEach(([x,z]) =>
    put('kk_bush', x, 0, z, 3+Math.random(), Math.random()*6));

  // Poplar trees (Bishkek!) + Kenney as fill
  const treeSpots = [[-16,18],[-16,-18],[16,18],[16,-18],[-16,35],[16,-35],[-16,-40],[16,40],[20,30],[-20,-30],[-25,12],[25,-12],[-20,50],[20,-50],[-18,0],[18,0],[-16,45],[16,-45]];
  // poplar-pp: max=13 → scale ~0.7 for ~9m tree (Poly Pizza, good proportions)
  treeSpots.forEach(([x,z]) => {
    put('poplar', x, 0, z, 0.6+Math.random()*0.25, Math.random()*6);
  });

  // Fences removed (Kenney asset deleted)

  // ── Moving vehicles (Sketchfab realistic) ──
  // ps1-corolla: max=11.5 → scale 0.4 ≈ 4.6m (real car size)
  // ps1-vw-golf: max=20 → scale 0.22
  // lp-bmw-e46: max=289 → scale 0.016
  // ps1-tahoe: max=3.2 → scale 1.5
  // taxi-stylized: max=5.8 → scale 0.8
  const c1 = put('car_corolla', -3.3, 0, 18, 0.4, 0);
  if(c1) mv.cars.push({ m:c1, ax:'z', sp:-7, lo:-65, hi:65, stop:[-8,0], dir:'ns' });
  const c2 = put('car_golf', 3.3, 0, -20, 0.22, Math.PI);
  if(c2) mv.cars.push({ m:c2, ax:'z', sp:6, lo:-65, hi:65, stop:[0,8], dir:'ns' });
  const c3 = put('car_taxi', 25, 0, 3.2, 0.8, -Math.PI/2);
  if(c3) mv.cars.push({ m:c3, ax:'x', sp:-5.5, lo:-65, hi:65, stop:[-8,0], dir:'ew' });
  const c4 = put('car_tahoe', -30, 0, -3.2, 1.5, Math.PI/2);
  if(c4) mv.cars.push({ m:c4, ax:'x', sp:5, lo:-65, hi:65, stop:[0,8], dir:'ew' });

  // City buses (Sketchfab)
  // modern-bus: max=26 → scale 0.4; green-bus: max=9.8 → scale 1.2
  const bus = put('sf_bus_green', 3.3, 0, -40, 1.2, 0);
  if(bus) mv.cars.push({ m:bus, ax:'z', sp:-4, lo:-65, hi:65, stop:[-8,0], dir:'ns' });

  const bus2 = put('sf_bus_modern', -25, 0, -3.2, 0.4, Math.PI/2);
  if(bus2) mv.cars.push({ m:bus2, ax:'x', sp:4.5, lo:-65, hi:65, stop:[0,8], dir:'ew' });

  // Parked vehicles
  put('car_van', 13, 0, -15, 0.7, .05);
  put('car_truck', -13, 0, 22, 2.5, Math.PI);
  put('car_bmw', -13, 0, -25, 0.016, 0);

  // Lowpoly people group (replace capsule pedestrians on sidewalks)
  const ppl1 = put('lp_people', 12, 0, 0, 0.025, 0);
  const ppl2 = put('lp_people', -12, 0, -5, 0.025, Math.PI);
  const ppl3 = put('lp_people', 12, 0, 20, 0.02, Math.PI/4);

  // Bicycle (cyclist on the road)  
  const bike = put('bicycle', 5.5, 0, -15, 0.02, Math.PI);
  if(bike) mv.cyc = { m:bike, sp:4 };

  // Cyclist already placed above with bicycle model

  // Pedestrians (capsule)
  const pMats = [0x4477aa, 0xe8ddd0, 0x335544, 0xcc6644, 0x7744aa].map(c =>
    new THREE.MeshStandardMaterial({ color:c, roughness:.75 }));
  function ped(x,z,mi){
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(.22,.8,4,8), pMats[mi]);
    body.position.y = .85; body.castShadow = true; g.add(body);
    const head = new THREE.Mesh(new THREE.SphereGeometry(.16,8,8),
      new THREE.MeshStandardMaterial({ color:0xd4a070, roughness:.8 }));
    head.position.y = 1.55; head.castShadow = true; g.add(head);
    g.position.set(x, 0, z); S.add(g); return g;
  }
  const pd = [
    { sx:12, sz:-4, ex:12, ez:7, sp:1.3 },
    { sx:12.8, sz:-3, ex:12.8, ez:6, sp:1 },
    { sx:-12, sz:3, ex:-12, ez:-5, sp:1.15 },
    { sx:-11.5, sz:-8, ex:-11.5, ez:8, sp:.9 },
    { sx:11, sz:12, ex:11, ez:25, sp:1.1 },
  ];
  pd.forEach((p,i) => mv.peds.push({ m:ped(p.sx,p.sz,i), ...p, t:i*.3 }));
}

/* ── traffic light logic ──────────────── */
let tlT=0, tlP='green';
const CY = { green:8, yellow:2, red:8, redYellow:1.5 };

function updTL(dt){
  if(quizActive) return; // freeze during quiz
  tlT += dt;
  if(tlT > CY[tlP]){
    tlT = 0;
    tlP = tlP==='green'?'yellow':tlP==='yellow'?'red':tlP==='red'?'redYellow':'green';
    const ns = tlP==='green'?'g':tlP==='redYellow'?'y':tlP==='yellow'?'y':'r';
    document.getElementById('dot').className = 'dot '+ns;
    document.getElementById('ltxt').textContent =
      ns==='g'?'Зелёный':ns==='y'?'Жёлтый':'Красный';
  }
}

/* ── camera ────────────────────────────── */
let curC = 'top';
const cams = {
  top: { p:[5,32,35], t:[0,0,0] },
  drv: { p:[-3.3,2,21], t:[-3.3,1.5,0] },
  ped: { p:[14,1.7,-3], t:[0,1,-3] },
  cin: null,
};

document.getElementById('bar').addEventListener('click', e => {
  const b = e.target.closest('button');
  if(!b) return;
  if(b.id === 'pp'){ paused=!paused; b.textContent=paused?'▶':'⏸'; return; }
  const c = b.dataset.c; if(!c) return;
  curC = c;
  if(cams[c]){ cam.position.set(...cams[c].p); oc.target.set(...cams[c].t); }
  document.querySelectorAll('#bar button[data-c]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
});

/* ── loop ─────────────────────────────── */
let paused = false, time = 0;
const clock = new THREE.Clock();

function tick(){
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), .05);
  oc.update();
  if(paused){ R.render(S,cam); return; }
  time += dt;

  updTL(dt);
  const nsGo = tlP==='green' || tlP==='redYellow';
  const ewGo = tlP==='red';

  mv.cars.forEach(c => {
    const go = c.dir==='ns' ? nsGo : ewGo;
    const p = c.m.position[c.ax];
    if(go || p<c.stop[0] || p>c.stop[1]) c.m.position[c.ax] += c.sp * dt;
    if(c.m.position[c.ax] > c.hi) c.m.position[c.ax] = c.lo;
    if(c.m.position[c.ax] < c.lo) c.m.position[c.ax] = c.hi;
  });

  if(mv.cyc){
    mv.cyc.m.position.z += mv.cyc.sp * dt;
    mv.cyc.m.position.x = 5.5 + Math.sin(time*2.5)*.12;
    if(mv.cyc.m.position.z > 65) mv.cyc.m.position.z = -65;
  }

  mv.peds.forEach(p => {
    p.t += dt*p.sp*.07;
    const f = Math.abs((p.t%2)-1);
    p.m.position.x = THREE.MathUtils.lerp(p.sx, p.ex, f);
    p.m.position.z = THREE.MathUtils.lerp(p.sz, p.ez, f);
    p.m.position.y = Math.abs(Math.sin(time*p.sp*5))*.03;
    p.m.rotation.y = p.t%2<1 ? 0 : Math.PI;
  });

  if(curC==='drv' && mv.cars[0]){
    const c = mv.cars[0].m;
    cam.position.set(c.position.x, 2.2, c.position.z+4);
    oc.target.set(c.position.x, 1.5, c.position.z-15);
  }
  if(curC==='cin'){
    cam.position.x = Math.cos(time*.08)*35;
    cam.position.z = Math.sin(time*.08)*35;
    cam.position.y = 14+Math.sin(time*.15)*4;
    oc.target.set(0,2,0);
  }

  document.getElementById('tm').textContent = time.toFixed(1);
  R.render(S,cam);
}

/* ── init ─────────────────────────────── */
Promise.all(manifest.map(load)).then(() => {
  document.getElementById('load').classList.add('ok');
  build();
  tick();
});

addEventListener('resize', () => {
  cam.aspect = innerWidth/innerHeight;
  cam.updateProjectionMatrix();
  R.setSize(innerWidth, innerHeight);
});

/* ── Quiz System ──────────────────────── */
let scenarios = [];
let currentQ = 0;
let score = 0;
let quizActive = false;

// Load scenarios
fetch('scenarios/quiz-scenarios.json')
  .then(r => r.json())
  .then(data => { scenarios = data; })
  .catch(() => { console.warn('No quiz scenarios found'); });

window.startQuiz = function() {
  document.getElementById('start-screen').classList.add('hidden');
  currentQ = 0;
  score = 0;
  quizActive = true;
  document.getElementById('qtotal').textContent = scenarios.length;
  showQuestion();
};

function showQuestion() {
  if (currentQ >= scenarios.length) { showResults(); return; }
  const s = scenarios[currentQ];
  document.getElementById('qnum').textContent = currentQ + 1;
  document.getElementById('quiz-title').textContent = s.title;
  document.getElementById('quiz-question').textContent = s.question;

  // Set traffic light
  if (s.trafficLight) {
    tlP = s.trafficLight === 'green' ? 'green' : s.trafficLight === 'red' ? 'red' : 'yellow';
    tlT = 999; // prevent auto-cycle during quiz
    const ns = tlP === 'green' ? 'g' : tlP === 'yellow' ? 'y' : 'r';
    document.getElementById('dot').className = 'dot ' + ns;
    document.getElementById('ltxt').textContent =
      ns === 'g' ? 'Зелёный' : ns === 'y' ? 'Жёлтый' : 'Красный';
  }

  // Options
  const optsDiv = document.getElementById('quiz-options');
  optsDiv.innerHTML = '';
  s.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    btn.onclick = () => answerQuestion(i);
    optsDiv.appendChild(btn);
  });

  // Hide explanation and next
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');

  // Show quiz
  document.getElementById('quiz').classList.add('active');

  // Pause traffic
  paused = true;
  // Wait 2 sec then unpause for dramatic effect
  setTimeout(() => { paused = false; }, 500);
}

function answerQuestion(idx) {
  const s = scenarios[currentQ];
  const opts = document.querySelectorAll('.opt');

  // Mark correct/wrong
  opts.forEach((o, i) => {
    o.classList.add('disabled');
    if (i === s.correct) o.classList.add('correct');
    if (i === idx && i !== s.correct) o.classList.add('wrong');
  });

  if (idx === s.correct) score++;

  // Show explanation
  document.getElementById('expl-text').textContent = s.explanation;
  document.getElementById('expl-article').textContent = s.article;
  document.getElementById('explanation').classList.add('show');
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('next-btn').textContent =
    currentQ < scenarios.length - 1 ? 'Следующий вопрос →' : 'Показать результат';
}

window.nextQuestion = function() {
  currentQ++;
  if (currentQ >= scenarios.length) {
    showResults();
  } else {
    showQuestion();
  }
};

function showResults() {
  document.getElementById('quiz').classList.remove('active');
  const pct = Math.round(score / scenarios.length * 100);
  const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '👍' : pct >= 40 ? '😐' : '📚';
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-text').textContent =
    `Правильных ответов: ${score} из ${scenarios.length} (${pct}%).\n` +
    (pct >= 80 ? 'Отлично! Вы хорошо знаете ПДД.' :
     pct >= 60 ? 'Неплохо, но есть над чем поработать.' :
     'Рекомендуем повторить правила дорожного движения.');
  document.getElementById('results').classList.add('show');
  paused = false;
}

window.restartQuiz = function() {
  document.getElementById('results').classList.remove('show');
  document.getElementById('start-screen').classList.remove('hidden');
};
</script>
